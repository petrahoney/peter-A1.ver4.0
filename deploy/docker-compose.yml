version: "3.8"

# PETER AI v4.0 — Local self-host stack.
# Run from /app/deploy:    docker compose up -d
#
# This file reproduces the original problem-statement architecture
# (Next.js / FastAPI / PostgreSQL / Redis / ChromaDB / Ollama / Nginx).
# The live Emergent preview uses a reduced stack (React + FastAPI + MongoDB),
# but the application code in /app/backend works as-is when wired here
# because every service URL is .env-driven.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: peter-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: peter-postgres
    environment:
      POSTGRES_USER: peter
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: peter_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: peter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: peter-chromadb
    ports:
      - "8002:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: peter-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend.Dockerfile
    container_name: peter-backend
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: peter_ai_v4
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY}
      DATABASE_URL: postgresql://peter:${POSTGRES_PASSWORD:-changeme}@postgres:5432/peter_ai
      REDIS_URL: redis://redis:6379
      CHROMADB_URL: http://chromadb:8000
      OLLAMA_URL: http://ollama:11434
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - mongo
      - postgres
      - redis
      - chromadb
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend.Dockerfile
    container_name: peter-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8001
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: peter-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
  redis_data:
  chromadb_data:
  mongo_data:
